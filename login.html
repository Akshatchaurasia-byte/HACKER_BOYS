<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DevMatch</title>
  <meta name="description" content="Log in to DevMatch and find your perfect hackathon teammates.">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1.25rem; background:var(--bg-base); }
    .auth-card { background:rgba(19,16,46,0.7); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:var(--radius-xl); padding:2.5rem; width:100%; max-width:440px; animation:form-slide-in 0.4s ease; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo a { text-decoration:none; }
    .auth-icon { font-size:2.5rem; margin-bottom:0.75rem; display:block; }
    .auth-title { font-size:1.6rem; font-weight:800; margin-bottom:0.5rem; color:var(--text-primary); }
    .auth-sub { color:var(--text-secondary); font-size:0.9rem; }
    .auth-form .form-group { margin-bottom:1.25rem; }
    .auth-divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; color:var(--text-muted); font-size:0.8rem; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.9rem; color:var(--text-muted); }
    .auth-footer a { color:var(--accent-cyan); font-weight:600; text-decoration:none; }
    .auth-footer a:hover { text-decoration:underline; }
    .auth-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius-sm); padding:0.75rem 1rem; font-size:0.85rem; color:#fca5a5; margin-bottom:1rem; display:none; align-items:center; gap:0.5rem; }
    .auth-error.show { display:flex; }
    .auth-btn { width:100%; justify-content:center; padding:0.85rem 1.5rem; font-size:1rem; }
    .auth-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .demo-box { background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.15); border-radius:var(--radius-sm); padding:0.75rem 1rem; margin-top:1.25rem; font-size:0.8rem; color:var(--text-secondary); }
    .demo-box strong { color:var(--accent-cyan); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">
          <span class="logo-text" style="font-size:1.6rem;">DEV<span class="text-grad">MATCH</span></span>
        </a>
      </div>
      <div style="text-align:center; margin-bottom:2rem;">
        <span class="auth-icon">&#x1F512;</span>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Log in to find your next hackathon teammate</p>
      </div>

      <div class="auth-error" id="login-error">
        <span>&#x26A0;</span>
        <span id="login-error-msg">Invalid email or password.</span>
      </div>

      <form class="auth-form" id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="name@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg auth-btn" id="login-btn">
          Log In
        </button>
      </form>

      <div class="demo-box">
        <strong>Demo:</strong> After seeding, use any email like <strong>ananya@devmatch.io</strong> with password <strong>password123</strong>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script>
    (function() {
      // If already logged in, redirect
      if (DevMatchAPI.getToken()) {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('login-btn');
        var errEl = document.getElementById('login-error');
        var errMsg = document.getElementById('login-error-msg');
        btn.disabled = true;
        btn.textContent = 'Logging in...';
        errEl.classList.remove('show');

        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;

        DevMatchAPI.login(email, password)
          .then(function(data) {
            if (data.error) {
              errMsg.textContent = data.error;
              errEl.classList.add('show');
              btn.disabled = false;
              btn.textContent = 'Log In';
              return;
            }
            DevMatchAPI.saveAuth(data.token, data.user);
            window.location.href = 'index.html';
          })
          .catch(function(err) {
            errMsg.textContent = 'Connection error. Is the server running?';
            errEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Log In';
          });
      });
    })();
  </script>
</body>
</html>
