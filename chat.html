<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | DevMatch</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .chat-layout { display: flex; height: calc(100vh - var(--nav-h) - 64px); background: var(--bg-surface); padding-top: var(--nav-h); }
    .chat-sidebar { width: 300px; background: var(--bg-card-solid); border-right: 1px solid var(--border); overflow-y: auto; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); }
    
    .sidebar-header { padding: 1.5rem 1.25rem 1rem; font-weight: 800; font-size: 1.25rem; border-bottom: 1px solid var(--border); }
    .conn-list { padding: 0.5rem; }
    .conn-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); border: 1px solid transparent; }
    .conn-item:hover { background: rgba(124,58,237,0.05); border-color: rgba(124,58,237,0.1); }
    .conn-item.active { background: rgba(124,58,237,0.1); border-color: var(--accent-violet); }
    .conn-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; flex-shrink: 0; }
    .conn-info { flex: 1; overflow: hidden; }
    .conn-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .conn-role { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-header { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; background: var(--bg-card-solid); }
    .chat-history { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    
    .message { max-width: 70%; display: flex; flex-direction: column; }
    .message.sent { align-self: flex-end; }
    .message.received { align-self: flex-start; }
    
    .msg-bubble { padding: 0.8rem 1.2rem; border-radius: var(--radius-lg); font-size: 0.95rem; line-height: 1.5; color: var(--text-primary); border: 1px solid var(--border); }
    .message.received .msg-bubble { background: var(--bg-surface); border-bottom-left-radius: 4px; }
    .message.sent .msg-bubble { background: linear-gradient(135deg, #7c3aed, #ec4899); color: white; border-bottom-right-radius: 4px; border: none; }
    
    .msg-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; }
    .message.sent .msg-time { text-align: right; }

    .chat-input-area { padding: 1.25rem; background: var(--bg-card-solid); border-top: 1px solid var(--border); display: flex; gap: 1rem; }
    .chat-input { flex: 1; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 999px; padding: 0.8rem 1.5rem; font-size: 0.95rem; color: var(--text-primary); outline: none; }
    .chat-input:focus { border-color: var(--accent-violet); }
    
    .no-chat-selected { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; padding: 2rem; }
    .no-chat-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

    @media (max-width: 768px) {
      .chat-layout { flex-direction: column; }
      .chat-sidebar { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      .chat-history { padding: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Dev<span class="logo-accent">Match</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="nav-explore">Explore</a>
        <a href="people.html" class="nav-link" id="nav-people">People</a>
        <a href="matches.html" class="nav-link" id="nav-matches">My Matches</a>
        <a href="chat.html" class="nav-link active" id="nav-chat">Chat</a>
      </div>
      <div class="nav-right">
        <button class="btn btn-ghost btn-sm hidden" id="nav-logout-btn">Logout</button>
        <div class="user-avatar-nav hidden" id="nav-user-avatar"></div>
      </div>
    </div>
  </nav>

  <main class="chat-layout">
    <aside class="chat-sidebar">
            <div class="sidebar-header" style="display:flex; justify-content:space-between; align-items:center;">
        Conversations
        <button class="btn btn-ghost btn-sm" id="inbox-toggle-btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;">Team Inbox</button>
      </div>
      
      <!-- Team Inbox Panel -->
      <div id="team-inbox-panel" class="hidden" style="background: var(--bg-surface); padding: 1rem; border-bottom: 1px solid var(--border);">
        <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase;">Pending Applications</div>
        <div id="inbox-list"></div>
      </div>
      <div class="conn-list" id="conn-list">
        <!-- Connections injected here -->
        <div style="padding:1rem;text-align:center;color:var(--text-muted);font-size:0.85rem;" id="conn-loading">Loading connections...</div>
      </div>
    </aside>
    
    <section class="chat-main" id="chat-main">
      <div class="no-chat-selected" id="no-chat">
        <div class="no-chat-icon">💬</div>
        <h2>Select a conversation</h2>
        <p>Choose an accepted connection from the sidebar to start messaging.</p>
      </div>
      
      <!-- Target injected dynamically when a chat is selected -->
      <div id="active-chat" class="hidden" style="display:flex;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div class="conn-avatar" id="chat-avatar" style="background:#ddd;">?</div>
          <div>
            <div class="conn-name" id="chat-name">Select User</div>
            <div class="conn-role" id="chat-role">...</div>
          </div>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <form class="chat-input-area" id="chat-form">
          <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off" required>
          <button type="submit" class="btn btn-primary" style="border-radius:999px;padding:0 1.5rem;">Send</button>
        </form>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Explore</span>
    </a>
    <a href="people.html" class="bottom-nav-item">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>People</span>
    </a>
    <a href="chat.html" class="bottom-nav-item active">
      <!-- Chat Icon -->
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>Chat</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </a>
  </nav>

  <!-- IMPORTANT: Load socket.io client script -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script>
    if (!DevMatchAPI.isLoggedIn()) {
      window.location.href = 'login.html';
    } else {
      DevMatchAPI.getMe().then(data => {
        var cu = data.user;
        document.getElementById('nav-user-avatar').textContent = getInitials(cu.name);
        document.getElementById('nav-user-avatar').classList.remove('hidden');
        document.getElementById('nav-user-avatar').style.background = avatarStyle(cu.avatarColor || 0);
        document.getElementById('nav-logout-btn').classList.remove('hidden');
        document.getElementById('nav-logout-btn').addEventListener('click', DevMatchAPI.logout);
        ChatApp.init(cu);
      });
    }
  </script>
</body>
</html>
